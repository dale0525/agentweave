name: macOS Desktop package

on:
  pull_request:
    paths:
      - ".github/workflows/macos-desktop-package.yml"
      - "apps/desktop/**"
      - "crates/**"
      - "examples/**"
      - "products/**"
      - "scripts/**"
      - "Cargo.lock"
      - "Cargo.toml"
      - "pixi.lock"
      - "pixi.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: ${{ matrix.app }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        app:
          - minimal-agent
          - secretary-agent
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.0
        with:
          cache: true
      - name: Install Desktop dependencies
        run: pixi run npm --prefix apps/desktop ci
      - name: Build development package
        run: >-
          pixi run package-macos
          --input examples/${{ matrix.app }}
          --output dist/macos/${{ matrix.app }}
          --overwrite
      - name: Locate App bundle
        id: app-bundle
        shell: bash
        run: |
          app_path="$(find "dist/macos/${{ matrix.app }}" -mindepth 2 -maxdepth 2 -type d -name '*.app' -print -quit)"
          test -n "$app_path"
          echo "path=$app_path" >> "$GITHUB_OUTPUT"
      - name: Smoke packaged sidecar
        run: >-
          pixi run packaged-sidecar-check
          --app "${{ steps.app-bundle.outputs.path }}"
      - name: Archive App bundle
        shell: bash
        run: |
          /usr/bin/ditto -c -k --keepParent "${{ steps.app-bundle.outputs.path }}" "dist/macos/${{ matrix.app }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: agentweave-${{ matrix.app }}-macos
          path: dist/macos/${{ matrix.app }}.zip
          if-no-files-found: error
          retention-days: 7
