[workspace]
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[tasks]
fmt = "cargo fmt --all"
test = "cargo test --workspace"
server = "cargo run -p agent-server"
dev = "node scripts/dev.mjs"
test-dev-script = "node --test scripts/dev.test.mjs"

[dependencies]
nodejs = ">=22,<23"
rust = ">=1.86,<1.90"
pkg-config = ">=0.29"
openssl = ">=3"
sqlite = ">=3.45"
