[workspace]
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[tasks]
fmt = "cargo fmt --all"
test = "cargo test --workspace"
mobile-ffi-test = "cargo test -p mobile-ffi"
android-native = "node scripts/build-android-rust.mjs"
android-test = "cd apps/android && ANDROID_HOME=$PIXI_PROJECT_ROOT/.tool/android-sdk ANDROID_SDK_ROOT=$PIXI_PROJECT_ROOT/.tool/android-sdk ./gradlew :app:testDebugUnitTest"
android-assemble = "cd apps/android && ANDROID_HOME=$PIXI_PROJECT_ROOT/.tool/android-sdk ANDROID_SDK_ROOT=$PIXI_PROJECT_ROOT/.tool/android-sdk ./gradlew :app:assembleDebug"
mobile-mvp-check = "node scripts/mobile-mvp-check.mjs"
skill-lifecycle-check = "cargo fmt --all --check && cargo clippy --workspace --all-targets -- -D warnings && cargo test --workspace && npm --prefix apps/desktop test && npm --prefix apps/desktop exec tsc -- --noEmit -p apps/desktop/tsconfig.vitest.json && node scripts/mobile-mvp-check.mjs && node scripts/check-source-lines.mjs"
server = "cargo run -p agent-server --bin agent-server"
dev = "node scripts/dev.mjs"
check-skills = "cargo run -p agent-server --bin check-skills -- --root skills"
bundle-skills = "cargo run -p agent-server --bin bundle-skills -- --source skills --output dist/skills --platform desktop"
install-hooks = "node scripts/install-hooks.mjs"
test-dev-script = "node --test scripts/*.test.mjs"
source-lines = "node scripts/check-source-lines.mjs"
sidecar-transport-check = "cargo build -p agent-server --bin agent-server && node scripts/check-local-transport.mjs"
packaged-sidecar-check = "node scripts/check-packaged-sidecar.mjs"
scaffold-agent-app = "node scripts/scaffold-agent-app.mjs"
package-agent-app = "node scripts/package-agent-app.mjs"
package-macos = "node apps/desktop/scripts/package-macos.mjs"
package-macos-minimal = "node apps/desktop/scripts/package-macos.mjs --input examples/minimal-agent --output dist/macos/minimal --overwrite"
package-macos-secretary = "node apps/desktop/scripts/package-macos.mjs --input examples/secretary-agent --output dist/macos/secretary --overwrite"
store-server-secret = "cargo run -p agent-server --bin store-secret --"
validate-agent-assets = "node scripts/scaffold-agent-app.mjs --validate catalog/foundation-skills.json && node scripts/scaffold-agent-app.mjs --validate examples/minimal-agent && node scripts/scaffold-agent-app.mjs --validate examples/secretary-agent"

[dependencies]
nodejs = ">=22,<23"
rust = ">=1.86,<1.90"
pkg-config = ">=0.29"
openssl = ">=3"
sqlite = ">=3.45"
openjdk = "17.*"
python = "3.12.*"
pyyaml = ">=6,<7"
rust-std-aarch64-linux-android = "=1.89.0"
